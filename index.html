<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oleodotti e siti di estrazione nel mondo</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <style>
    :root{
      --brand:#900014;
      --brand-dark:#5f000d;
      --brand-soft:#c45a69;
      --brand-pale:#ebc8ce;
      --ink:#1e1e1e;
      --bg:#f6f2f2;
      --card:#ffffff;
      --line:#d9c9cc;
      --gold:#c9a227;
    }
    html, body {
      height:100%;
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--ink);
      background:var(--bg);
      overflow:hidden;
    }
    #app {
      display:flex;
      height:100vh;
      width:100%;
      min-height:0;
    }
    #sidebar {
      width:430px;
      min-width:430px;
      max-width:430px;
      overflow-y:auto;
      overflow-x:hidden;
      background:var(--card);
      border-right:1px solid var(--line);
      padding:18px 16px 24px;
      box-sizing:border-box;
    }
    #map-wrap{
      position:relative;
      flex:1 1 auto;
      min-width:0;
      min-height:0;
      background:#eef1f2;
    }
    #map {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      min-height:0;
    }
    h1 { font-size: 24px; line-height:1.1; margin:0 0 8px; color:var(--brand); }
    .intro { font-size:14px; line-height:1.45; margin:0 0 16px; color:#4b3a3d; }
    .section { margin-top:18px; }
    .section h2 { font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--brand-dark); margin:0 0 8px; }
    .control-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
    label { font-size:13px; }
    select, input[type="text"]{
      width:100%; box-sizing:border-box; border:1px solid var(--line); background:#fff; color:var(--ink);
      border-radius:10px; padding:10px 12px; font-size:14px;
    }
    .toggle-group { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .toggle-card, .stat-card {
      border:1px solid var(--line); border-radius:14px; padding:10px 12px; background:#fff;
    }
    .toggle-card input { margin-right:6px; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card b { display:block; font-size:20px; color:var(--brand); }
    .stat-card span { font-size:12px; color:#6b5d60; }
    button {
      border:0; background:var(--brand); color:#fff; border-radius:999px; padding:10px 14px; cursor:pointer; font-weight:600;
    }
    button.secondary { background:#fff; color:var(--brand); border:1px solid var(--brand-pale); }
    .legend { font-size:13px; line-height:1.5; display:grid; gap:6px; }
    .legend-item { display:flex; align-items:center; gap:8px; }
    .swatch { width:14px; height:14px; border-radius:4px; display:inline-block; border:1px solid rgba(0,0,0,.08); }
    .line-swatch { width:20px; height:0; border-top-width:3px; border-top-style:solid; display:inline-block; }
    .footer-note { margin-top:18px; font-size:12px; color:#6b5d60; line-height:1.45; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:var(--brand-pale); color:var(--brand-dark); font-size:11px; font-weight:700; }
    .popup-title { font-weight:700; color:var(--brand); font-size:16px; margin-bottom:6px; }
    .popup-meta { font-size:13px; line-height:1.45; }
    .popup-meta strong { color:var(--brand-dark); }
    .leaflet-popup-content { margin:14px 16px; }
    .leaflet-container a { color:var(--brand); }

    .meta-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .meta-btn {
      background:#fff; color:var(--brand); border:1px solid var(--brand-pale);
      border-radius:999px; padding:8px 12px; font-size:12px; font-weight:700;
      cursor:pointer;
    }
    .meta-btn:hover { background:var(--bg); }
    .modal-overlay {
      position:fixed; inset:0; background:rgba(30,30,30,.45);
      display:none; align-items:center; justify-content:center; z-index:3000; padding:20px;
    }
    .modal-overlay.open { display:flex; }
    .modal-card {
      width:min(640px, 100%); max-height:80vh; overflow:auto; background:#fff; color:var(--ink);
      border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.18); border:1px solid var(--line);
      padding:18px 18px 16px; box-sizing:border-box;
    }
    .modal-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .modal-title { margin:0; font-size:18px; color:var(--brand); }
    .modal-close {
      background:#fff; color:var(--brand); border:1px solid var(--brand-pale);
      border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer;
    }
    .modal-body { font-size:14px; line-height:1.55; color:#4b3a3d; }
    .modal-body p { margin:0 0 10px; }
    .embed-textarea {
      width:100%; min-height:110px; box-sizing:border-box; border:1px solid var(--line);
      border-radius:12px; padding:10px 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px;
      resize:vertical; margin:10px 0;
    }
    .copy-status { font-size:12px; color:#6b5d60; margin-top:6px; min-height:1em; }

    @media (max-width: 960px){
      html, body { overflow:auto; }
      #app {
        display:block;
        height:auto;
      }
      #sidebar {
        width:100%;
        min-width:0;
        max-width:none;
        border-right:0;
        border-bottom:1px solid var(--line);
        overflow:visible;
      }
      #map-wrap{
        position:relative;
        height:430px;
      }
      #map{
        position:absolute;
        inset:0;
        height:100%;
      }
    }
